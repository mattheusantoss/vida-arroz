{% extends "admin/base_admin.html" %}
{% block body %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <div class="flex justify-center mb-6">
                <img src="{{ url_for('static', filename='images/vida-arroz-logo.svg') }}" alt="Vida Arroz" class="h-12 w-auto">
            </div>
            <h1 class="text-2xl font-bold text-[#000545] mb-2">Área administrativa</h1>
            <p class="text-gray-600 mb-6">Vida Arroz – Faça login para acessar os leads.</p>
            {% if error %}
            <div class="mb-4 p-3 rounded-lg bg-red-50 text-red-700 text-sm">{{ error }}</div>
            {% endif %}
            <form method="post" action="{{ url_for('admin_login') }}" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Usuário</label>
                    <input type="text" id="username" name="username" required autofocus
                        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 focus:border-[#000545] focus:ring-2 focus:ring-[#000545]/30">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <input type="password" id="password" name="password" required
                        class="w-full rounded-lg border border-gray-300 px-3 py-2 text-gray-900 focus:border-[#000545] focus:ring-2 focus:ring-[#000545]/30">
                </div>
                <button type="submit" class="w-full rounded-lg bg-[#000545] px-4 py-3 font-semibold text-white hover:bg-[#000438] focus:outline-none focus:ring-2 focus:ring-[#000545] focus:ring-offset-2">Entrar</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
