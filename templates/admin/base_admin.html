<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} - Vida Arroz</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon-vida-arroz.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    {% block body %}
    {% if session.get('admin_logged_in') %}
    <header class="bg-[#000545] text-white shadow">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex flex-wrap items-center justify-between gap-4">
                <a href="{{ url_for('admin_leads') }}" class="flex items-center gap-3">
                    <img src="{{ url_for('static', filename='images/vida-arroz-logo.svg') }}" alt="Vida Arroz" class="h-10 w-auto">
                    <span class="font-semibold text-lg">Painel administrativo</span>
                </a>
                <nav class="flex flex-wrap items-center gap-1 sm:gap-2">
                    <a href="{{ url_for('admin_dashboards') }}" class="rounded-lg px-3 py-2 text-sm font-medium {% if request.endpoint == 'admin_dashboards' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">Dashboards</a>
                    <a href="{{ url_for('admin_usuarios') }}" class="rounded-lg px-3 py-2 text-sm font-medium {% if request.endpoint == 'admin_usuarios' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">Usuários</a>
                    <a href="{{ url_for('admin_leads') }}" class="rounded-lg px-3 py-2 text-sm font-medium {% if request.endpoint == 'admin_leads' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">Leads</a>
                    <a href="{{ url_for('admin_receitas') }}" class="rounded-lg px-3 py-2 text-sm font-medium {% if request.endpoint == 'admin_receitas' %}bg-white/20{% else %}hover:bg-white/10{% endif %}">Receitas</a>
                    <a href="{{ url_for('admin_logout') }}" class="rounded-lg px-3 py-2 text-sm font-medium text-red-200 hover:bg-white/10 hover:text-white ml-2">Sair</a>
                </nav>
            </div>
        </div>
    </header>
    {% endif %}
    <main class="max-w-6xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
</body>
</html>
